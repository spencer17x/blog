<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>iOS setSelectionRange minimal repro</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px 14px 34px;
      background: #f5f6f8;
      color: #18202a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      margin: 4px 0 10px;
      font-size: 23px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .run {
      display: block;
      width: 100%;
      min-height: 94px;
      margin: 10px 0;
      border: 2px solid #b42318;
      border-radius: 8px;
      background: #fff;
      color: #b42318;
      font: inherit;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .run.secondary {
      border-color: #0b6bcb;
      color: #0b6bcb;
    }

    .run.safe {
      border-color: #137333;
      color: #137333;
    }

    .status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .box {
      min-height: 58px;
      padding: 9px;
      border: 1px solid #d6dce5;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
    }

    .box strong {
      display: block;
      margin-bottom: 4px;
      color: #647084;
      font-size: 12px;
    }

    label {
      display: block;
      margin: 9px 0;
      color: #647084;
      font-size: 13px;
    }

    input {
      display: block;
      width: 100%;
      min-height: 46px;
      margin-top: 5px;
      border: 1px solid #b8c2d0;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: #18202a;
      font: inherit;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #0b6bcb;
      box-shadow: 0 0 0 3px rgba(11, 107, 203, 0.18);
    }

    pre {
      min-height: 170px;
      max-height: 260px;
      overflow: auto;
      margin: 12px 0 0;
      padding: 10px;
      border-radius: 8px;
      background: #111827;
      color: #d1fae5;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Minimal setSelectionRange focus repro</h1>
    <button id="run" class="run" type="button">RUN BATCH setSelectionRange</button>
    <button id="focus-run" class="run secondary" type="button">FOCUS A THEN RUN BATCH</button>
    <button id="safe-run" class="run safe" type="button">SAFE: only activeElement</button>

    <div class="status">
      <div class="box">
        <strong>activeElement</strong>
        <span id="active">-</span>
      </div>
      <div class="box">
        <strong>lastFocusedInput</strong>
        <span id="last">-</span>
      </div>
    </div>

    <label>
      input A
      <input data-name="input A" value="A-13800138000" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </label>
    <label>
      input B
      <input data-name="input B" value="B-24681012" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </label>
    <label>
      input C
      <input data-name="input C" value="C-hello-ios-safari" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </label>
    <label>
      input D
      <input data-name="input D" value="D-last-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </label>

    <pre id="log"></pre>
  </main>

  <script>
    const inputs = Array.from(document.querySelectorAll('input'));
    const activeEl = document.querySelector('#active');
    const lastEl = document.querySelector('#last');
    const logEl = document.querySelector('#log');
    let lastFocusedInput = null;

    function nameOf(element) {
      if (!element) return '-';
      if (element.dataset && element.dataset.name) return element.dataset.name;
      if (element.id) return element.id;
      return element.tagName ? element.tagName.toLowerCase() : String(element);
    }

    function stamp() {
      const now = new Date();
      return [
        String(now.getHours()).padStart(2, '0'),
        String(now.getMinutes()).padStart(2, '0'),
        String(now.getSeconds()).padStart(2, '0'),
        String(now.getMilliseconds()).padStart(3, '0')
      ].join(':');
    }

    function log(message) {
      logEl.textContent = `${stamp()} ${message}\n${logEl.textContent}`;
    }

    function update() {
      activeEl.textContent = nameOf(document.activeElement);
      lastEl.textContent = nameOf(lastFocusedInput);
    }

    function batchSetSelection() {
      log(`start; active=${nameOf(document.activeElement)}`);

      inputs.forEach(input => {
        const start = Math.min(2, input.value.length);
        const end = input.value.length;
        input.setSelectionRange(start, end);
        log(`${nameOf(input)} setSelectionRange(${start}, ${end}); active=${nameOf(document.activeElement)}`);
      });

      log(`end; active=${nameOf(document.activeElement)}`);
      update();
    }

    function safeSetActiveSelection() {
      const active = document.activeElement;
      log(`safe start; active=${nameOf(active)}`);

      if (!inputs.includes(active)) {
        log(`safe skip; active=${nameOf(active)} is not a test input`);
        update();
        return;
      }

      const start = Math.min(2, active.value.length);
      const end = active.value.length;
      active.setSelectionRange(start, end);
      log(`safe ${nameOf(active)} setSelectionRange(${start}, ${end}); active=${nameOf(document.activeElement)}`);
      update();
    }

    function focusThenBatch() {
      log('focus input A, then batch');
      inputs[0].focus();
      update();
      window.setTimeout(batchSetSelection, 450);
    }

    document.querySelector('#run').addEventListener('click', batchSetSelection);
    document.querySelector('#focus-run').addEventListener('click', focusThenBatch);
    document.querySelector('#safe-run').addEventListener('click', safeSetActiveSelection);
    document.addEventListener('focusin', event => {
      if (inputs.includes(event.target)) {
        lastFocusedInput = event.target;
      }
      log(`focusin: ${nameOf(event.target)}; active=${nameOf(document.activeElement)}`);
      update();
    });
    document.addEventListener('focusout', event => {
      log(`focusout: ${nameOf(event.target)}; active=${nameOf(document.activeElement)}`);
      setTimeout(update, 0);
    });

    update();
    log(`ready: ${navigator.userAgent}`);

    const autorun = new URLSearchParams(window.location.search).get('autorun');
    if (autorun === 'batch-only') {
      window.setTimeout(batchSetSelection, 700);
    } else if (autorun === 'safe-only') {
      window.setTimeout(safeSetActiveSelection, 700);
    }
  </script>
</body>
</html>
